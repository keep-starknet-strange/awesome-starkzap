  </text>

  <rect x="380" y="372" width="440" height="56" rx="14" fill="#111a38"/>
  <text x="420" y="408" fill="#e5e7eb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700">
