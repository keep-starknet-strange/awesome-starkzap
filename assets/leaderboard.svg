  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <text x="70" y="110" fill="#f9fafb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="40" font-weight="900">
