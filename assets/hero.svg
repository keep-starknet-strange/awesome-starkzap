<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Koool_Shit hero mock screenshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#120a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="60" y="48" width="1080" height="64" rx="16" fill="#0f1733" opacity="0.92" filter="url(#shadow)"/>
  <text x="92" y="89" fill="#e5e7eb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="700">
    Koool_Shit
  </text>
  <rect x="938" y="62" width="186" height="36" rx="10" fill="url(#accent)"/>
  <text x="960" y="86" fill="#06101a" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700">
    Connect Wallet
  </text>

  <!-- Hero left -->
  <text x="84" y="220" fill="#f9fafb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="54" font-weight="800">
    On-Chain Leaderboard
  </text>
  <text x="84" y="268" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">
    Gasless scores on Starknet Sepolia
  </text>

  <rect x="84" y="312" width="160" height="48" rx="12" fill="url(#accent)"/>
  <text x="135" y="344" fill="#06101a" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="800">
    Play
  </text>

  <rect x="258" y="312" width="190" height="48" rx="12" fill="#111a38" opacity="0.9"/>
  <text x="300" y="344" fill="#e5e7eb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700">
    View Leaderboard
  </text>

  <!-- Right card -->
  <rect x="720" y="190" width="420" height="360" rx="18" fill="#0f1733" opacity="0.95" filter="url(#shadow)"/>
  <text x="760" y="240" fill="#f9fafb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="800">
    Global Record
  </text>
  <rect x="760" y="262" width="340" height="2" fill="url(#accent)" opacity="0.9"/>

  <text x="760" y="316" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14">
    Holder
  </text>
  <text x="760" y="344" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">
    0x6677&9e08
  </text>

  <text x="760" y="392" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14">
    Score
  </text>
  <text x="760" y="426" fill="#f9fafb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="900">
    12,340
  </text>

  <g fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14">
    <text x="760" y="474">Level: 9</text>
    <text x="860" y="474">Deaths: 3</text>
    <text x="980" y="474">Coins: 42</text>
  </g>

  <text x="760" y="520" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12">
    Mock screenshot (replace with real screenshots anytime)
  </text>
</svg>

